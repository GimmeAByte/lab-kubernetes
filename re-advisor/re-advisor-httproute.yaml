apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: re-advisor-httproute
  namespace: re-advisor # Ensure this is the namespace where your service lives
spec:
  parentRefs:
  - name: lab-gateway
    namespace: nginx-gateway
  hostnames:
  - "re-advisor.ui.stark.labs" 
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: / # <--- Catching EVERYTHING at the root
    backendRefs:
    - name: re-advisor-open-webui # <--- Your confirmed service name
      port: 80 # <--- Service port
