apiVersion: v1
kind: PersistentVolume
metadata:
  name: re-advisor-open-webui-pv # This is the unique name for this disk in your cluster
spec:
  capacity:
    storage: 50Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  # Retain ensures your 100GB of models aren't deleted if you delete the Helm release
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage # This label connects it to your PVC in values.yaml
  local:
    path: /var/lib/re-advisor-data/open-webui # The exact path to your new LVM mount
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - lab-alienware # Pins this volume to the hardware where it physically exists
