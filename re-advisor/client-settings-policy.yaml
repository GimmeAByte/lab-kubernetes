apiVersion: gateway.nginx.org/v1alpha1
kind: ClientSettingsPolicy
metadata:
  name: internal-gateway-upload-limit
  namespace: nginx-gateway # Usually nginx-gateway
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: lab-gateway
  body:
    maxSize: "100m" # Unit required (e.g., 'm' for megabytes)
