apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-test-route
  namespace: real-estate
spec:
  parentRefs:
  - name: lab-gateway
    namespace: nginx-gateway
  # Hostnames omitted to allow any IP-based access
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        hostname: google.com
        statusCode: 302
